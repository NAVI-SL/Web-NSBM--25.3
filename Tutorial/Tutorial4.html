<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial 4</title>
</head>
<body>
    <div style="display: flex;">
        <div style="width: 50%; padding: 20px; background-color: lightblue;">
            <fieldset>
                <legend>Event Details</legend>
            <form>
                <label>Event Name</label><br>
                <input type="text" name="eventname"><br><br>

                <label>Organizer</label><br>
                <input type="text" name="org"><br><br>

                <label>Event Type</label><br>
                <input type="radio" name="btn1">Public <br>
                <input type="radio" name="btn1">Private <br>

                <label>Event Email</label>
                <input type="email" name="email"><br>

                <label>Category</label><br>
                <select>
                    <option>Conference</option>
                    <option>Workshop</option>
                    <option>Drama</option>
                </select><br>

                <label>Event Date and Time</label>
                <input type="datetime-local" name="datetime"><br><br>

                <label for="location">Location:</label>
                <input id="location" name="location" type="text"><br><br>

                <label>Facilities</label><br>
                <input type="checkbox" name="1" value="asv1">Projector <br>
                <input type="checkbox" name="34" value="trdtr">Screen <br>
                <input type="checkbox" name="21" value="asa">Projector <br>

                <label>Pin / Password</label> 
                <input type="password"><br>

                <input type="button" value="submit">
            </form>
            </fieldset>
        </div>

        <div style="width: 50%; padding: 20px; background-color: lightpink; text-align: center;">
            <img src="https://marlborough.librarycalendar.com/sites/default/files/2024-02/LibraryCalendar%20Adult%20Program%20Images%20(7).png" alt="music" style="height: 500px; width: 350px; padding: 35px;">
        </div>
    </div>
</body>
</html>
