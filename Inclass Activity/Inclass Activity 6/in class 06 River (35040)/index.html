<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rivers of Sri Lanka</title>
    <link rel="stylesheet" href="styles.css">
    <script>
        function welcomeMessage() {
            alert("Welcome to Rivers of Sri Lanka Website 🌊");
        }

        function calculateRiverSpeed() {
            let distance = document.getElementById("distance").value;
            let time = document.getElementById("time").value;
    

            if (distance === "" || time === "") {
                alert("Please enter both values!");
                return;
            }

            let speed = distance / time;
            alert("River Flow Speed is: " + speed + " km/h");
        }
    </script>
</head>
<body>
    <header>
        <h1>Rivers of Sri Lanka</h1>

    </header>

    <div class="sub-title">
        <h1>Beautiful Rivers in Sri Lanka</h1>
    </div>

    </div>
