<!DOCTYPE html>
<html>
<head>
    <title>Cafe Bun Purchase</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <h1>Cafe Bun Purchase</h1>
    <form id="priceform">
        <label>Available Buns: <span id="stock">100</span></label>
        <br><br>
        <label>How many buns do you want to buy?</label>
        <input type="number" id="quantity" name="quantity" min="1">
        <br><br>
        <button type="button" onclick="bunspurchase();">Calculate price for buns</button>
    </form>
    <h2>Total Price: RS. <span id="totalvalue">0.00</span></h2>
    <h2>Remaining Buns: <span id="remainingbuns">100</span></h2>
</body>
<script src="buns.js"></script>
</html>
