<html>
<head>
	<title>Activity 02</title>
</head>
<body>
	<div id="output"></div>
	
	<script>
		var temperature = prompt("Enter the current temperature in Celsius:");
		
		if (temperature > 20) {
			document.getElementById('output').innerHTML = "It's a warm day!";
		} else {
			document.getElementById('output').innerHTML = "It's a cool day!";
		}
	</script>

</body>
</html>
