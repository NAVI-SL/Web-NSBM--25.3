<html>
<head>
	<title>Activity 07</title>
</head>
<body>
	<h1>Cafe Bun Purchase</h1>
	<p>We have 100 buns for sale, each priced at 50 rupees.</p>
	<form>
		<label>Enter the number of buns you want to buy:</label>
		<input type="number" id="bunsBought" name="bunsBought" required>
		<br><br>
		
		<button type="button" onclick="calculateBunPrices()">Calculate Prices</button>
	</form>
	<h2 id="totalPrice"></h2>
	<h2 id="remainingPrice"></h2>
	
	<script>
		function calculateBunPrices() {
			var totalBuns = 100;
			var pricePerBun = 50;
			
			var bunsBought = document.getElementById('bunsBought').value;
			
			var totalPrice = bunsBought * pricePerBun;
			
			var remainingBun = totalBuns - bunsBought;
			var remainingPrice = remainingBun * pricePerBun;
		
			document.getElementById('totalPrice').innerHTML = "Total Price for Buns Bought: " + totalPrice + " rupees";        
			document.getElementById('remainingPrice').innerHTML = "Price of Remaining Buns: " + remainingPrice + " rupees";
		}
	</script>
</body>
</html>
