<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MySite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <header class="bg-dark text-white p-3 text-center">
        <h2>MySite</h2>
        <nav class="mt-2">
            <a href="#" class="text-white me-3 text-decoration-none">Home</a>
            <a href="#" class="text-white me-3 text-decoration-none">About</a>
            <a href="#" class="text-white text-decoration-none">Contact</a>
        </nav>
    </header>

    <section class="container text-center p-5 bg-light rounded mt-4">
        <h1>Welcome to MySite</h1>
        <p>Learn Bootstrap easily</p>
        <button class="btn btn-primary">Get Started</button>
    </section>

    <section class="container mt-4 mb-4">
        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card">
                    <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Card Image 1">
                    <div class="card-body">
                        <h5 class="card-title">Card Title 1</h5>
                        <p class="card-text">This is a short description for the first responsive card.</p>
                        <a href="#" class="btn btn-success">Action</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card">
                    <img src="https://via.placeholder.com/400x200" class="card-img-top" alt="Card Image 2">
                    <div class="card-body">
                        <h5 class="card-title">Card Title 2</h5>
                        <p class="card-text">This is a short description for the second responsive card.</p>
                        <a href="#" class="btn btn-success">Action</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white text-center p-3">
        <p class="mb-0">Footer Content &copy; MySite</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
