<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="script.js"></script>
</head>
<body>
    <form id="patientForm">
    <fieldset style="width:500px;">
        <legend>Student Registration Form</legend>

        Student Name: <input type="text" id="name"><br><br>

        Age: <input type="text" id="age"><br><br>

        E-mail: <input type="email" id="email"><br><br>

        Gender:
        Male <input type="radio" name="gender" value="Male">
        Female <input type="radio" name="gender" value="Female"><br><br>

        Course:
        <select id="disease">
        <option value="">Select</option>
        <option>Information Technology</option>
        <option>Data Science</option>
        <option>Business Management </option>
        <option>Software Engineering </option>
        </select><br><br>

        Terms and Conditions: <input type="checkbox" id="Conditions" name="Conditions" value="Conditions"><br><br>
        

        <button type="button" onclick="register()">Register</button>
  </fieldset>
</form>
</body>
</html>
